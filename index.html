<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Hughes AI — Case Queue</title>
  <script>
    // ── Browser error capture → dev server ──────────────────────────
    (function() {
      const LOG = 'http://localhost:8787/log';
      function send(level, message, url, line, col) {
        fetch(LOG, { method: 'POST', headers: {'Content-Type':'application/json'},
          body: JSON.stringify({ level, message: String(message), url: url||location.href, line: line||'', col: col||'' })
        }).catch(()=>{});
      }
      window.onerror = function(msg, src, line, col, err) {
        send('error', (err ? err.stack||err : msg), src, line, col); return false;
      };
      window.addEventListener('unhandledrejection', function(e) {
        send('error', 'UnhandledRejection: ' + (e.reason?.stack || e.reason || e));
      });
      const _ce = console.error.bind(console);
      console.error = function(...a) { send('error', a.map(String).join(' ')); _ce(...a); };
      const _cw = console.warn.bind(console);
      console.warn  = function(...a) { const m = a.map(String).join(' '); if (!m.includes('cdn.tailwindcss.com')) send('warn', m); _cw(...a); };
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="styles/main.css">
</head>
<body class="bg-gray-100 text-gray-900">

<div class="app-shell">
  <!-- NAV RAIL -->
  <nav class="nav-rail">
    <!-- Logo -->
    <div class="w-8 h-8 rounded-lg bg-indigo-700 flex items-center justify-center mb-3 flex-shrink-0">
      <svg viewBox="0 0 24 24" fill="white" class="w-4 h-4"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4z"/></svg>
    </div>

    <a href="index.html" class="nav-item active" title="Queue">
      <svg viewBox="0 0 24 24" fill="currentColor" class="w-4.5 h-4.5 w-5 h-5"><path d="M4 6h16v2H4zm0 5h16v2H4zm0 5h16v2H4z"/></svg>
      <span class="tooltip">Case Queue</span>
    </a>
    <div class="nav-item" onclick="document.getElementById('case-search').focus()">
      <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      <span class="tooltip">Search</span>
    </div>
    <a href="supervisor.html" class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M16 11c1.66 0 2.99-1.34 2.99-3S17.66 5 16 5c-1.66 0-3 1.34-3 3s1.34 3 3 3zm-8 0c1.66 0 2.99-1.34 2.99-3S9.66 5 8 5C6.34 5 5 6.34 5 8s1.34 3 3 3zm0 2c-2.33 0-7 1.17-7 3.5V19h14v-2.5c0-2.33-4.67-3.5-7-3.5zm8 0c-.29 0-.62.02-.97.05 1.16.84 1.97 1.97 1.97 3.45V19h6v-2.5c0-2.33-4.67-3.5-7-3.5z"/></svg>
      <span class="tooltip">Supervisor</span>
    </a>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
      <span class="tooltip">Reports</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M19 2H5c-1.1 0-2 .9-2 2v16c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-7 3c1.93 0 3.5 1.57 3.5 3.5S13.93 12 12 12s-3.5-1.57-3.5-3.5S10.07 5 12 5zm7 13H5v-.23c0-.62.28-1.2.76-1.58C7.47 15.82 9.64 15 12 15s4.53.82 6.24 2.19c.48.38.76.97.76 1.58V18z"/></svg>
      <span class="tooltip">Knowledge Base</span>
    </div>

    <div class="flex-1"></div>

    <div class="nav-item" title="Dark mode">
      <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9 9-4.03 9-9c0-.46-.04-.92-.1-1.36-.98 1.37-2.58 2.26-4.4 2.26-2.98 0-5.4-2.42-5.4-5.4 0-1.81.89-3.42 2.26-4.4-.44-.06-.9-.1-1.36-.1z"/></svg>
      <span class="tooltip">Dark Mode</span>
    </div>
    <div class="nav-item">
      <svg viewBox="0 0 24 24" fill="currentColor" class="w-5 h-5"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm1 15h-2v-2h2v2zm0-4h-2V7h2v6z"/></svg>
      <span class="tooltip">Help</span>
    </div>
  </nav>

  <!-- LEFT SIDEBAR -->
  <aside class="left-sidebar">
    <div class="sidebar-header">
      <div class="flex items-center gap-2 mb-3">
        <span class="text-sm font-bold text-gray-900">Hughes AI</span>
        <span class="text-[9px] px-1.5 py-0.5 rounded bg-indigo-100 text-indigo-700 border border-indigo-300">Associate</span>
      </div>

      <!-- Search -->
      <div id="queue-view">
        <div class="relative">
          <svg viewBox="0 0 24 24" fill="#484f58" class="w-3.5 h-3.5 absolute left-2 top-1/2 -translate-y-1/2 pointer-events-none">
            <path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/>
          </svg>
          <input type="search" id="case-search" placeholder="Case ID, customer, CFPB ref..." class="w-full pl-7 pr-2 py-1.5 text-xs rounded-md bg-white border border-gray-300 text-gray-800 placeholder-gray-400 focus:outline-none focus:border-indigo-600" oninput="QUEUE.handleSearch(this.value)">
        </div>
      </div>
    </div>

    <!-- Quick Stats -->
    <div class="px-3 py-2 border-b border-gray-200 grid grid-cols-3 gap-1.5" id="sidebar-stats">
      <div class="text-center p-1.5 rounded bg-red-50 border border-red-300">
        <div class="text-base font-bold text-red-600" id="stat-red">—</div>
        <div class="text-[9px] text-red-600">SLA Red</div>
      </div>
      <div class="text-center p-1.5 rounded bg-amber-50 border border-amber-300">
        <div class="text-base font-bold text-amber-600" id="stat-amber">—</div>
        <div class="text-[9px] text-amber-600">SLA Amber</div>
      </div>
      <div class="text-center p-1.5 rounded bg-gray-100">
        <div class="text-base font-bold text-gray-700" id="stat-total">—</div>
        <div class="text-[9px] text-gray-500">Total</div>
      </div>
    </div>

    <!-- Filter Bar -->
    <div class="filter-bar">
      <button class="filter-btn active-filter" data-filter="all">All</button>
      <button class="filter-btn" data-filter="sla-red">🔴 SLA Red</button>
      <button class="filter-btn" data-filter="sla-amber">🟡 SLA Amber</button>
      <button class="filter-btn" data-filter="p1">P1</button>
      <button class="filter-btn" data-filter="p2">P2</button>
      <button class="filter-btn" data-filter="reg-e">Reg E</button>
      <button class="filter-btn" data-filter="fcra">FCRA</button>
      <button class="filter-btn" data-filter="cfpb">CFPB</button>
    </div>

    <!-- Queue List -->
    <div class="queue-scroll" id="queue-list">
      <!-- Rendered by queue.js -->
    </div>

    <!-- Search Results (hidden by default) -->
    <div class="queue-scroll hidden" id="search-results"></div>
  </aside>

  <!-- MAIN CONTENT — LANDING -->
  <main class="main-content flex flex-col items-center justify-center p-8 text-center">
    <div class="grid grid-cols-3 gap-4 max-w-xl w-full text-left mb-6" id="metric-cards"></div>

    <div class="max-w-xl w-full">
      <div class="text-xs font-semibold text-gray-500 uppercase tracking-wide mb-2 text-left">Quick Access — Recent Cases</div>
      <div class="space-y-1.5" id="quick-cases"></div>
    </div>
  </main>
</div>

<script src="js/data/customers.js"></script>
<script src="js/data/cases.js"></script>
<script src="js/data/touchpoints.js"></script>
<script src="js/app.js"></script>
<script src="js/queue.js"></script>
<script>
  document.addEventListener('DOMContentLoaded', () => {
    const cases = window.CASES || [];
    const slaBreaches = cases.filter(c => QUEUE.hasSLAStatus(c, 'red')).length;
    const p1Active = cases.filter(c => c.priority === 'P1').length;
    const total = cases.length;

    // Update sidebar stats
    const statRed = document.getElementById('stat-red');
    const statAmber = document.getElementById('stat-amber');
    const statTotal = document.getElementById('stat-total');
    if (statRed) statRed.textContent = slaBreaches;
    if (statAmber) statAmber.textContent = cases.filter(c => QUEUE.hasSLAStatus(c, 'amber')).length;
    if (statTotal) statTotal.textContent = total;

    const metricCards = document.getElementById('metric-cards');
    if (metricCards) {
      metricCards.innerHTML = `
        <div class="p-3 rounded-lg border border-red-300 bg-red-50">
          <div class="text-2xl font-bold text-red-600 mb-0.5">${slaBreaches}</div>
          <div class="text-xs text-red-600 font-medium">SLA Breaches</div>
          <div class="text-[11px] text-gray-500 mt-0.5">Require immediate attention</div>
        </div>
        <div class="p-3 rounded-lg border border-amber-300 bg-amber-50">
          <div class="text-2xl font-bold text-amber-600 mb-0.5">${p1Active}</div>
          <div class="text-xs text-amber-600 font-medium">P1 Active</div>
          <div class="text-[11px] text-gray-500 mt-0.5">Regulatory / legal priority</div>
        </div>
        <div class="p-3 rounded-lg border border-gray-300 bg-gray-50">
          <div class="text-2xl font-bold text-gray-700 mb-0.5">${total}</div>
          <div class="text-xs text-gray-700 font-medium">Total Cases</div>
          <div class="text-[11px] text-gray-500 mt-0.5">Across all regulations</div>
        </div>
      `;
    }

    const quickContainer = document.getElementById('quick-cases');
    if (quickContainer && window.CASES) {
      quickContainer.innerHTML = window.CASES.map(c => {
        const customer = window.CUSTOMERS[c.customerId];
        const slaInfo = QUEUE.getWorstSLA(c);
        const slaColor = APP.getSLAColor(slaInfo.status);
        return `
          <a href="case.html?case=${c.id}" class="flex items-center gap-3 p-2.5 rounded-lg border border-gray-200 bg-white hover:bg-gray-50 hover:border-indigo-300 transition-all text-left group">
            <span class="font-mono text-xs text-indigo-600 group-hover:text-indigo-500">${c.id}</span>
            <span class="text-xs text-gray-500 flex-1 truncate">${c.category}</span>
            <span class="text-xs text-gray-500">${customer?.displayName || '—'}</span>
            <span class="text-[11px] font-bold flex-shrink-0" style="color:${slaColor}">${slaInfo.text}</span>
          </a>
        `;
      }).join('');
    }
  });
</script>
</body>
</html>
